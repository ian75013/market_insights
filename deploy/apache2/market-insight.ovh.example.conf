# Market Insights production reverse proxy example (Apache2 on OVH)
#
# Usage:
# 1) Copy to /etc/apache2/sites-available/market-insight.conf
# 2) Replace placeholders (__LIKE_THIS__)
# 3) Enable modules and site:
#      sudo a2enmod proxy proxy_http headers ssl rewrite
#      sudo a2ensite market-insight.conf
#      sudo apache2ctl configtest && sudo systemctl reload apache2

<VirtualHost *:80>
    ServerName __APP_DOMAIN__
    Redirect permanent / https://__APP_DOMAIN__/
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName __APP_DOMAIN__

    ErrorLog  ${APACHE_LOG_DIR}/market-insight-error.log
    CustomLog ${APACHE_LOG_DIR}/market-insight-access.log combined

    SSLEngine on
    SSLCertificateFile __SSL_CERT__
    SSLCertificateKeyFile __SSL_KEY__
    Include /etc/letsencrypt/options-ssl-apache.conf

    ProxyPreserveHost On
    ProxyRequests Off
    SSLProxyEngine On
    ProxyTimeout 120

    # API first: /api/* on public URL -> API root in container
    ProxyPass        /api/ http://127.0.0.1:18000/ retry=0 timeout=120
    ProxyPassReverse /api/ http://127.0.0.1:18000/

    # Frontend app
    ProxyPass        / http://127.0.0.1:18080/ retry=0 timeout=120
    ProxyPassReverse / http://127.0.0.1:18080/

    RequestHeader set X-Forwarded-Proto "https"
</VirtualHost>
</IfModule>
