upstream react_frontend {
  server frontend:80;
}

upstream api_backend {
  server api:8000;
}

server {
  listen 80;
  server_name market-insight.doctumconsilium.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name market-insight.doctumconsilium.com;

  ssl_certificate /etc/letsencrypt/live/market-insight.doctumconsilium.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/market-insight.doctumconsilium.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;

  client_max_body_size 20m;

  location /api/ {
    rewrite ^/api/?(.*)$ /$1 break;
    proxy_pass http://api_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://react_frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
