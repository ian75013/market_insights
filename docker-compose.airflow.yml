# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  Market Insights — docker-compose.airflow.yml
#
#  Compose override that adds Airflow to the stack.
#  Use on top of docker-compose.prod.yml:
#
#    docker compose -f docker-compose.prod.yml -f docker-compose.airflow.yml up -d --build
#
#  Exposes:
#    Airflow webserver  http://localhost:8080  (behind Apache on prod: /airflow)
#
#  Design:
#    - airflow-db   : dedicated Postgres for Airflow metadata (separate from mi-db)
#    - airflow-init : one-shot container that runs `airflow db migrate` + creates admin user
#    - airflow-scheduler : runs the scheduler process
#    - airflow-webserver : runs the web UI
#
#  The market_insights package is installed inside the Airflow image via a
#  requirements-airflow.txt that pip-installs the local package in editable mode.
#  The DAGs folder is mounted read-only so code edits on the host take effect
#  without rebuilding.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3-python3.11
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER:-airflow}:${AIRFLOW_DB_PASSWORD:-airflow}@airflow-db:5432/${AIRFLOW_DB_NAME:-airflow}
    AIRFLOW__CORE__FERNET_KEY: '${AIRFLOW_FERNET_KEY:?Set AIRFLOW_FERNET_KEY in .env (generate with: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")}'
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__BASE_URL: ${AIRFLOW_BASE_URL:-http://localhost:8080}
    AIRFLOW__WEBSERVER__SECRET_KEY: '${AIRFLOW_SECRET_KEY:?Set AIRFLOW_SECRET_KEY in .env}'
    AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: "30"
    # Pass the market_insights DB URL so the DAG can open a session
    MI_DATABASE_URL: postgresql://${POSTGRES_USER:-market_insights}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-market_insights}
    MI_USE_NETWORK: ${USE_NETWORK:-true}
  volumes:
    - ./market_insights/etl/dags:/opt/airflow/dags:ro
    - airflow-logs:/opt/airflow/logs
    - ./deploy/airflow/requirements-airflow.txt:/requirements-airflow.txt:ro
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    airflow-db:
      condition: service_healthy
  networks:
    - mi-net

services:

  # ── Airflow metadata database ───────────────────────────────────
  airflow-db:
    image: postgres:16-alpine
    container_name: mi-airflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${AIRFLOW_DB_USER:-airflow}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD:-airflow}
      POSTGRES_DB: ${AIRFLOW_DB_NAME:-airflow}
    volumes:
      - airflow-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_DB_USER:-airflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mi-net

  # ── One-shot init: migrate DB + create admin user ───────────────
  airflow-init:
    <<: *airflow-common
    container_name: mi-airflow-init
    restart: "no"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install --quiet -r /requirements-airflow.txt
        airflow db migrate
        airflow users create \
          --username "${AIRFLOW_ADMIN_USER:-admin}" \
          --password "${AIRFLOW_ADMIN_PASSWORD:-change_me_airflow}" \
          --firstname Admin \
          --lastname MI \
          --role Admin \
          --email "${AIRFLOW_ADMIN_EMAIL:-admin@example.com}" \
          || true
        echo "Airflow init complete"
    depends_on:
      airflow-db:
        condition: service_healthy

  # ── Scheduler ───────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: mi-airflow-scheduler
    restart: unless-stopped
    command:
      - bash
      - -c
      - |
        pip install --quiet -r /requirements-airflow.txt
        exec airflow scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $(hostname)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Webserver ───────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: mi-airflow-webserver
    restart: unless-stopped
    command:
      - bash
      - -c
      - |
        pip install --quiet -r /requirements-airflow.txt
        exec airflow webserver
    ports:
      - "${AIRFLOW_WEBSERVER_BIND:-127.0.0.1}:8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  airflow-pg-data:
  airflow-logs:
