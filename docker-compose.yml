# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  Market Insights — docker-compose.yml  (développement)
#
#  Backend  : SQLite, uvicorn --reload, code monté en volume
#  Frontend : Vite dev server (HMR sur port 3080)
#  Pas de nginx · Pas de certbot · Pas de PostgreSQL
#
#  Lancement :
#    docker compose up --build
#
#  → API      http://localhost:8000/docs
#  → Frontend http://localhost:3080
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

services:

  api:
    build: .
    container_name: mi-api-dev
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV: dev
      DATABASE_URL: sqlite:///./market_insights.db
      USE_NETWORK: ${USE_NETWORK:-true}
      DEFAULT_PRICE_PROVIDER: ${DEFAULT_PRICE_PROVIDER:-auto}
      LLM_BACKEND: ${LLM_BACKEND:-ollama}
      LLM_MODEL: ${LLM_MODEL:-tinyllama}
      OLLAMA_BASE_URL: http://ollama:11434
      MI_RUN_SEED: "true"
      MI_API_RELOAD: "true"
      MI_API_WORKERS: "1"
      MI_WAIT_DNS: "true"
    volumes:
      # Hot-reload : le code source est monté, pas copié dans l'image
      - .:/app
      # Persister la DB SQLite entre les redémarrages
      - sqlite-data:/app/data
    ports:
      - "8000:8000"
    command:
      - sh
      - /app/deploy/start_api.sh
    dns:
      - 8.8.8.8
      - 8.8.4.4
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 90s

  frontend:
    image: node:20-alpine
    container_name: mi-frontend-dev
    working_dir: /app
    volumes:
      - ./market_insights/frontend-react:/app
      # Isoler node_modules du host pour éviter les conflits linux/mac
      - frontend-node-modules:/app/node_modules
    ports:
      - "3080:3080"
    environment:
      # Le browser appelle /api/*, Vite proxy redirige vers le conteneur api
      VITE_API_BASE: /api
      # Cible du proxy Vite : nom du service Docker (pas localhost)
      VITE_PROXY_TARGET: http://api:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      api:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    container_name: mi-ollama-dev
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    entrypoint: /bin/sh
    command:
      - -c
      - |
        ollama serve &
        sleep 5
        if ! ollama list | grep -q tinyllama; then
          echo '[ollama] Model not found, pulling tinyllama (1.1B, ~1.5GB)...'
          ollama pull tinyllama
        else
          echo '[ollama] tinyllama already available'
        fi
        wait
    healthcheck:
      test: ["CMD", "sh", "-c", "ollama list | grep -q tinyllama"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 180s

volumes:
  sqlite-data:
  frontend-node-modules:
  ollama-data:
