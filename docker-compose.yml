services:

  db:
    image: postgres:16-alpine
    container_name: mi-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-market_insights}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-market_insights}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-market_insights}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mi-net

  api:
    build: .
    container_name: mi-api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-market_insights}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-market_insights}
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python -m market_insights.scripts.seed_demo_data &&
             uvicorn market_insights.api.main:app --host 0.0.0.0 --port 8000 --workers 2"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - mi-net

  frontend:
    build:
      context: ./market_insights/frontend-react
      args:
        VITE_API_BASE: /api
    container_name: mi-frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    networks:
      - mi-net

  nginx:
    image: nginx:1.27-alpine
    container_name: mi-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot-conf:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - mi-net

  certbot:
    image: certbot/certbot:latest
    container_name: mi-certbot
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - mi-net

volumes:
  pg-data:
  certbot-conf:
  certbot-www:

networks:
  mi-net:
    driver: bridge
