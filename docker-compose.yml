services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: >
      sh -c "python -m market_insights.scripts.seed_demo_data &&
             uvicorn market_insights.api.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
