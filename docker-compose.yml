# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  Market Insights — docker-compose.yml  (développement)
#
#  Backend  : SQLite, uvicorn --reload, code monté en volume
#  Frontend : Vite dev server (HMR sur port 3080)
#  Pas de nginx · Pas de certbot · Pas de PostgreSQL
#
#  Lancement :
#    docker compose up --build
#
#  → API      http://localhost:8000/docs
#  → Frontend http://localhost:3080
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

services:

  api:
    build: .
    container_name: mi-api-dev
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV: dev
      DATABASE_URL: sqlite:///./market_insights.db
      USE_NETWORK: ${USE_NETWORK:-true}
      DEFAULT_PRICE_PROVIDER: ${DEFAULT_PRICE_PROVIDER:-auto}
      LLM_BACKEND: ${LLM_BACKEND:-litellm}
      LLM_MODEL: ${LLM_MODEL:-llama3.2:1b}
      LITELLM_BASE_URL: ${LITELLM_BASE_URL:-http://litellm:4000}
      LITELLM_API_KEY: ${LITELLM_API_KEY:-}
      OLLAMA_BASE_URL: http://ollama:11434
      MI_RUN_SEED: "true"
      MI_API_RELOAD: "true"
      MI_API_WORKERS: "1"
      MI_WAIT_DNS: "true"
    volumes:
      # Hot-reload : le code source est monté, pas copié dans l'image
      - .:/app
      # Persister la DB SQLite entre les redémarrages
      - sqlite-data:/app/data
    ports:
      - "8000:8000"
    command:
      - sh
      - /app/deploy/start_api.sh
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - mi-net
      - litellm-shared
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 90s

  frontend:
    image: node:20-alpine
    container_name: mi-frontend-dev
    working_dir: /app
    volumes:
      - ./market_insights/frontend-react:/app
      # Isoler node_modules du host pour éviter les conflits linux/mac
      - frontend-node-modules:/app/node_modules
    ports:
      - "3080:3080"
    environment:
      # Le browser appelle /api/*, Vite proxy redirige vers le conteneur api
      VITE_API_BASE: /api
      # Cible du proxy Vite : nom du service Docker (pas localhost)
      VITE_PROXY_TARGET: http://api:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - mi-net

volumes:
  sqlite-data:
  frontend-node-modules:
  ollama-data:

networks:
  mi-net:
    driver: bridge
  litellm-shared:
    external: true
    name: ${LITELLM_SHARED_NETWORK:-litellm-gateway-vps_llmnet}
